<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GA Doces - Cada pedacinho importa!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .bg-roxo { background-color: #4A1D52; }
        .text-dourado { color: #D4AF37; }
        .border-dourado { border-color: #D4AF37; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

const PRODUTOS = [
    { id: 1, nome: "Brownie Recheado", descricao: "Brownies recheados artesanais, que derretem a cada mordida.", preco: 10.00, imagem: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSBy45IzvQemJ6_9eleq4NzW_SAorpwTrYyQw&s", sabores: ["Beijinho", "Doce de Leite"] },
    { id: 2, nome: "Alfajor", descricao: "Alfajores delicados, banhados com chocolate nobre.", preco: 8.00, imagem: "./alfajor.jpeg", sabores: ["Doce de Leite", "Brigadeiro"] },
    { id: 3, nome: "Palha Italiana", descricao: "Palha italiana cremosa, combinação perfeita de maciez e crocância.", preco: 8.00, imagem: "https://static.itdg.com.br/images/640-400/0905759e2388082609f88813f04b16e5/328303-original.jpg", sabores: ["Brigadeiro", "Oreo"] },
    { id: 4, nome: "Tortinha Gourmet", descricao: "Camadas de recheio, biscoito maisena e cobertura de ganache de chocolate.", preco: 12.00, imagem: "./tortinha-gourmet.jpg", sabores: ["Maracujá", "Limão"] },
    { id: 5, nome: "Caixa Surpresa (4 Unidades)", descricao: "Monte sua caixa com 4 delícias à sua escolha! Perfeito para presentear.", preco: 36.00, imagem: "./caixa-personalizada.jpg", isCombo: true }
];

const CUPONS = {
    "PRIMEIRACOMPRA": 0.10, // 10% de desconto
    "GADOCES5": 5.00       // 5 reais de desconto fixo
};

function App() {
    const [carrinho, setCarrinho] = useState([]);
    const [carrinhoAberto, setCarrinhoAberto] = useState(false);
    const [cupomTexto, setCupomTexto] = useState("");
    const [descontoAtivo, setDescontoAtivo] = useState({ codigo: "", valor: 0 });
    const numeroWhats = "5513992051054";

    const adicionarAoCarrinho = (produto, sabor) => {
        const item = { ...produto, saborEscolhido: sabor, unicoId: Date.now() };
        setCarrinho([...carrinho, item]);
        // Feedback visual de adicionado
    };

    const removerDoCarrinho = (id) => {
        setCarrinho(carrinho.filter(item => item.unicoId !== id));
    };

    const aplicarCupom = () => {
        const codigo = cupomTexto.toUpperCase().trim();
        if (CUPONS[codigo]) {
            setDescontoAtivo({ codigo, valor: CUPONS[codigo] });
            alert("Cupom aplicado com sucesso!");
        } else {
            alert("Cupom inválido!");
            setDescontoAtivo({ codigo: "", valor: 0 });
        }
    };

    const calcularTotal = () => {
        const subtotal = carrinho.reduce((acc, curr) => acc + curr.preco, 0);
        let total = subtotal;
        
        if (descontoAtivo.valor > 0) {
            total = descontoAtivo.valor < 1 
                ? subtotal * (1 - descontoAtivo.valor) 
                : subtotal - descontoAtivo.valor;
        }
        return Math.max(0, total);
    };

    const finalizarPedido = () => {
        let texto = `*Novo Pedido - GA Doces*\n\n`;
        carrinho.forEach(item => {
            texto += `• ${item.nome} (${item.saborEscolhido}) - R$ ${item.preco.toFixed(2)}\n`;
        });
        
        const subtotal = carrinho.reduce((acc, curr) => acc + curr.preco, 0);
        if (descontoAtivo.codigo) {
            texto += `\nSubtotal: R$ ${subtotal.toFixed(2)}`;
            texto += `\nCupom: ${descontoAtivo.codigo}`;
        }
        texto += `\n*Total Final: R$ ${calcularTotal().toFixed(2)}*`;
        
        window.open(`https://wa.me/${numeroWhats}?text=${encodeURIComponent(texto)}`);
    };

    return (
        <div className="min-h-screen flex flex-col relative">
            {/* Navbar Estilo Shopee */}
            <nav className="fixed top-0 left-0 right-0 bg-roxo z-50 shadow-md px-6 py-4 flex justify-between items-center border-b border-dourado/30">
                <div className="flex items-center gap-2">
                    <img src="./logo.jpg" className="w-10 h-10 rounded-full border border-dourado" />
                    <span className="text-dourado font-bold text-xl hidden sm:inline">GA Doces</span>
                </div>
                
                <button 
                    onClick={() => setCarrinhoAberto(true)}
                    className="relative bg-white/10 p-2 rounded-full hover:bg-white/20 transition-all group"
                >
                    <span className="text-2xl">🛒</span>
                    {carrinho.length > 0 && (
                        <span className="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full border-2 border-roxo animate-bounce">
                            {carrinho.length}
                        </span>
                    )}
                </button>
            </nav>

            {/* Sidebar do Carrinho */}
            <div className={`fixed inset-0 z-[60] transition-opacity duration-300 ${carrinhoAberto ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
                <div className="absolute inset-0 bg-black/50" onClick={() => setCarrinhoAberto(false)}></div>
                <div className={`absolute right-0 top-0 h-full w-full max-w-md bg-white shadow-2xl transition-transform duration-300 transform ${carrinhoAberto ? 'translate-x-0' : 'translate-x-full'} flex flex-col`}>
                    <div className="p-6 bg-roxo text-white flex justify-between items-center">
                        <h3 className="text-xl font-bold">Meu Carrinho</h3>
                        <button onClick={() => setCarrinhoAberto(false)} className="text-2xl">✕</button>
                    </div>

                    <div className="flex-grow overflow-y-auto p-6 space-y-4">
                        {carrinho.length === 0 ? (
                            <div className="text-center py-20">
                                <span className="text-6xl block mb-4">🧁</span>
                                <p className="text-gray-400 italic">Seu carrinho está vazio.</p>
                            </div>
                        ) : (
                            carrinho.map(item => (
                                <div key={item.unicoId} className="flex gap-4 border-b pb-4 items-center">
                                    <img src={item.imagem} className="w-16 h-16 rounded-lg object-cover" />
                                    <div className="flex-grow">
                                        <p className="font-bold text-sm text-roxo">{item.nome}</p>
                                        <p className="text-xs text-gray-400 leading-tight">{item.saborEscolhido}</p>
                                        <p className="font-bold text-gray-800 mt-1">R$ {item.preco.toFixed(2)}</p>
                                    </div>
                                    <button onClick={() => removerDoCarrinho(item.unicoId)} className="text-red-400 hover:text-red-600 font-bold text-sm">✕</button>
                                </div>
                            ))
                        )}
                    </div>

                    {carrinho.length > 0 && (
                        <div className="p-6 bg-gray-50 border-t">
                            {/* Sistema de Cupom */}
                            <div className="mb-4">
                                <p className="text-xs font-bold text-gray-500 uppercase mb-2">Cupom de Desconto</p>
                                <div className="flex gap-2">
                                    <input 
                                        type="text" 
                                        placeholder="EX: CUPOM10" 
                                        className="flex-grow p-2 border rounded-lg text-sm outline-none focus:border-roxo"
                                        value={cupomTexto}
                                        onChange={(e) => setCupomTexto(e.target.value)}
                                    />
                                    <button 
                                        onClick={aplicarCupom}
                                        className="bg-dourado text-roxo px-4 py-2 rounded-lg font-bold text-xs hover:brightness-110"
                                    >
                                        Aplicar
                                    </button>
                                </div>
                                {descontoAtivo.codigo && (
                                    <p className="text-green-600 text-[10px] mt-1 font-bold">Cupom {descontoAtivo.codigo} aplicado!</p>
                                )}
                            </div>

                            <div className="space-y-1 mb-4">
                                <div className="flex justify-between text-gray-500 text-sm">
                                    <span>Subtotal:</span>
                                    <span>R$ {carrinho.reduce((acc, curr) => acc + curr.preco, 0).toFixed(2)}</span>
                                </div>
                                {descontoAtivo.valor > 0 && (
                                    <div className="flex justify-between text-green-600 text-sm font-bold">
                                        <span>Desconto:</span>
                                        <span>- R$ {(carrinho.reduce((acc, curr) => acc + curr.preco, 0) - calcularTotal()).toFixed(2)}</span>
                                    </div>
                                )}
                                <div className="flex justify-between text-xl font-bold text-roxo pt-2 border-t">
                                    <span>Total:</span>
                                    <span>R$ {calcularTotal().toFixed(2)}</span>
                                </div>
                            </div>
                            <button 
                                onClick={finalizarPedido}
                                className="w-full bg-roxo text-dourado py-4 rounded-xl font-bold shadow-lg hover:brightness-110 transition-all flex items-center justify-center gap-2"
                            >
                                <span>🛒</span> Finalizar pelo WhatsApp
                            </button>
                        </div>
                    )}
                </div>
            </div>

            {/* Hero Section */}
            <header className="bg-roxo min-h-[80vh] flex flex-col items-center justify-center text-center px-4 border-b-8 border-dourado relative overflow-hidden mt-16">
                <div className="mb-6 w-56 h-56 md:w-72 md:h-72 rounded-full overflow-hidden shadow-2xl border-4 border-[#D4AF37] mx-auto z-10 transition-transform duration-500 hover:scale-105">
                    <img src="./logo.jpg" alt="Logo GA Doces" className="w-full h-full object-cover" />
                </div>
                <h1 className="text-4xl md:text-6xl font-bold text-dourado mb-3 tracking-tight z-10 mt-4">GA Doces</h1>
                <p className="text-white text-lg md:text-xl mb-8 opacity-90 font-light tracking-wide z-10">Onde cada pedacinho importa de verdade.</p>
                <div className="flex flex-col sm:flex-row gap-4 z-10">
                    <a href="#catalogo" className="border border-white text-white px-8 py-3 rounded-full font-bold hover:bg-white hover:text-roxo transition-all shadow-lg">Ver Catálogo</a>
                </div>
            </header>

            {/* Catálogo */}
            <section id="catalogo" className="py-24 bg-gray-50 px-4">
                <div className="text-center mb-12">
                    <h2 className="text-4xl font-bold text-roxo mb-4">Nosso Catálogo</h2>
                    <p className="text-gray-500">Escolha suas delícias e acompanhe pelo ícone lá em cima!</p>
                </div>

                <div className="max-w-6xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                    {PRODUTOS.map(doce => (
                        <CardDoce key={doce.id} doce={doce} aoAdicionar={adicionarAoCarrinho} />
                    ))}
                </div>
            </section>

            {/* Footer */}
            <footer className="bg-roxo text-white py-12 px-6 border-t-4 border-dourado mt-auto">
                <div className="max-w-4xl mx-auto text-center">
                    <h2 className="text-3xl font-bold text-dourado mb-8 font-serif">Fale Conosco</h2>
                    <div className="flex flex-col md:flex-row justify-center gap-10 items-center">
                        <a href={`https://wa.me/${numeroWhats}`} className="hover:text-dourado transition-colors flex items-center gap-2">
                            📱 (13) 99205-1054
                        </a>
                        <a href="https://www.instagram.com/ga_docees/" className="hover:text-dourado transition-colors flex items-center gap-2">
                            📸 @ga_docees
                        </a>
                    </div>
                </div>
            </footer>
        </div>
    );
}

function CardDoce({ doce, aoAdicionar }) {
    const [sabor, setSabor] = useState(doce.sabores ? doce.sabores[0] : "");
    const [escolhas, setEscolhas] = useState(["", "", "", ""]);

    const listaParaEscolha = [
        "Brownie (Beijinho)", "Brownie (Doce de Leite)",
        "Alfajor (Doce de Leite)", "Alfajor (Brigadeiro)",
        "Palha (Brigadeiro)", "Palha (Oreo)",
        "Tortinha (Maracujá)", "Tortinha (Limão)"
    ];

    const atualizarEscolha = (index, valor) => {
        const novasEscolhas = [...escolhas];
        novasEscolhas[index] = valor;
        setEscolhas(novasEscolhas);
    };

    const handleAdicionar = () => {
        if (doce.isCombo) {
            const saboresFinais = escolhas.filter(e => e !== "").join(", ");
            if (escolhas.some(e => e === "")) {
                alert("Por favor, escolha os 4 itens da sua caixinha!");
                return;
            }
            aoAdicionar(doce, saboresFinais);
        } else {
            aoAdicionar(doce, sabor);
        }
    };

    return (
        <div className="bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-2xl transition-all border border-gray-100 flex flex-col group">
            <div className="overflow-hidden h-52">
                <img src={doce.imagem} alt={doce.nome} className="h-full w-full object-cover group-hover:scale-110 transition-transform duration-500" />
            </div>
            <div className="p-6 flex flex-col flex-grow">
                <h3 className="text-2xl font-bold mb-2 text-roxo">{doce.nome}</h3>
                <p className="text-gray-500 text-sm mb-6 leading-relaxed h-12 overflow-hidden">{doce.descricao}</p>
                
                <div className="mt-auto">
                    {doce.isCombo ? (
                        <div className="space-y-2 mb-4">
                            {[0, 1, 2, 3].map((i) => (
                                <select 
                                    key={i}
                                    onChange={(e) => atualizarEscolha(i, e.target.value)}
                                    className="w-full p-2 bg-gray-50 border border-gray-200 rounded-lg text-xs outline-none focus:border-dourado"
                                >
                                    <option value="">Item {i+1}...</option>
                                    {listaParaEscolha.map(op => <option key={op} value={op}>{op}</option>)}
                                </select>
                            ))}
                        </div>
                    ) : (
                        <select 
                            value={sabor}
                            onChange={(e) => setSabor(e.target.value)}
                            className="w-full p-3 bg-gray-50 border-2 border-gray-100 rounded-xl text-sm mb-4 outline-none focus:border-dourado"
                        >
                            {doce.sabores.map(s => <option key={s} value={s}>{s}</option>)}
                        </select>
                    )}
                    
                    <div className="flex justify-between items-center mt-4">
                        <span className="text-xl font-bold text-gray-800">R$ {doce.preco.toFixed(2)}</span>
                        <button 
                            onClick={handleAdicionar}
                            className="bg-roxo text-white px-6 py-2 rounded-full text-sm font-bold hover:bg-opacity-90 shadow-md active:scale-95 transition-all"
                        >
                            Adicionar
                        </button>
                    </div>
                </div>
            </div>
        </div>
    );
}

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
